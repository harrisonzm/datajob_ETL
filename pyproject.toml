pytest = "^9.0.2"
pandas = "^3.0.1"
psycopg2-binary = "^2.9.11"
dbt-core = "^1.11.7"
dbt-postgres = "^1.10.0"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
