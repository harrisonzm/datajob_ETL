[tool.poetry]
name = "datajob-etl"
version = "0.1.0"
description = ""
authors = ["Harrison Zuleta Montoya <harrison.zmontoya@gmail.com>"]
readme = "README.md"
packages = [
    { include = "utils" },
    { include = "db" },
    { include = "actions" },
    { include = "extraction" },
    { include = "transformation" },
    { include = "load" }
]

[tool.poetry.dependencies]
python = "^3.12"
sqlalchemy = "^2.0.48"
pydantic = "^2.12.5"
