version: 2

models:
  - name: skill_types
    description: "Relationship table mapping skills to their types/categories (many-to-many)"
    columns:
      - name: id
        description: "Primary key for skill_types combination"
        tests:
          - unique
          - not_null
      - name: skill_id
        description: "Foreign key to dim_skills"
        tests:
          - not_null
          - relationships:
              to: ref('dim_skills')
              field: id
      - name: type_id
        description: "Foreign key to dim_types"
        tests:
          - not_null
          - relationships:
              to: ref('dim_types')
              field: id

  - name: job_skills
    description: "Relationship table mapping job posts to skill_types (many-to-many)"
    columns:
      - name: job_id
        description: "Foreign key to fact_job_posts"
        tests:
          - not_null
          - relationships:
              to: ref('fact_job_posts')
              field: id
      - name: skill_types_id
        description: "Foreign key to skill_types table"
        tests:
          - not_null
          - relationships:
              to: ref('skill_types')
              field: id
