# Docker Compose para ejecutar el pipeline ETL completo
version: "3.8"

services:
  # PostgreSQL para datos del proyecto
  db:
    image: postgres:16
    restart: always
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=job_posting
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Pipeline ETL
  etl-pipeline:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=job_posting
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    volumes:
      - ./logs:/app/logs
      - ./data_jobs.csv:/app/data_jobs.csv:ro
    command: ["pwsh", "-File", "evaluate.ps1"]

volumes:
  db-data:
