name: Code Quality

on:
  push:
    branches: [main, develop, "feat/*", "fix/*"]
  pull_request:
    branches: [main, develop]

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies
        run: poetry install --no-interaction --only=main

      - name: Run bandit security scan
        run: |
          poetry run pip install bandit
          poetry run bandit -r . -f json -o bandit-report.json --exclude=./.git,./.__pycache__,./.venv,./venv,./dist,./build,./.pytest_cache,./datajob_etl/target,./datajob_etl/dbt_packages,./airflow_logs,./logs || true

      - name: Run safety check
        run: |
          poetry run pip install safety
          poetry run safety check --json || true

  type-check:
    name: Type Checking
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies
        run: poetry install --no-interaction --only=main

      - name: Run mypy
        run: |
          poetry run pip install mypy types-requests
          poetry run mypy . --ignore-missing-imports --exclude="(\.git|__pycache__|\.venv|venv|dist|build|\.egg-info|\.pytest_cache|datajob_etl|airflow_logs|logs)" || true

  complexity:
    name: Code Complexity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install radon
        run: pip install radon

      - name: Check cyclomatic complexity
        run: |
          radon cc . -a -nb --exclude="*/.git/*,*/__pycache__/*,*/.venv/*,*/venv/*,*/dist/*,*/build/*,*/.pytest_cache/*,*/datajob_etl/*,*/airflow_logs/*,*/logs/*"
          radon cc . -a -nb --total-average --exclude="*/.git/*,*/__pycache__/*,*/.venv/*,*/venv/*,*/dist/*,*/build/*,*/.pytest_cache/*,*/datajob_etl/*,*/airflow_logs/*,*/logs/*"

      - name: Check maintainability index
        run: radon mi . -nb --exclude="*/.git/*,*/__pycache__/*,*/.venv/*,*/venv/*,*/dist/*,*/build/*,*/.pytest_cache/*,*/datajob_etl/*,*/airflow_logs/*,*/logs/*"
