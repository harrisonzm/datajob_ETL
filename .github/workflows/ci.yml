name: CI Pipeline Fixed

on:
  push:
    branches: [main, develop, "feat/*", "fix/*"]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.7.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies only
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --only=main

      - name: Install linting tools
        run: |
          poetry run pip install flake8 black

      - name: Debug - List directories
        run: |
          pwd
          ls -la
          ls -la extraction/ db/ utils/ || echo "Some directories not found"

      - name: Run flake8
        run: |
          poetry run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=.git,__pycache__,.venv,venv,dist,build,*.egg-info,.pytest_cache,datajob_etl/target,datajob_etl/dbt_packages,airflow_logs,logs

      - name: Run flake8 complexity check
        run: poetry run flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=.git,__pycache__,.venv,venv,dist,build,*.egg-info,.pytest_cache,datajob_etl/target,datajob_etl/dbt_packages,airflow_logs,logs

      - name: Run black check
        run: poetry run black --check . --exclude="/(\.git|__pycache__|\.venv|venv|dist|build|\.egg-info|\.pytest_cache|datajob_etl/target|datajob_etl/dbt_packages|airflow_logs|logs)/"

  test:
    name: Testing
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: job_posting
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.7.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --no-interaction --only=main

      - name: Install test dependencies
        run: |
          poetry run pip install pytest pytest-cov

      - name: Create test CSV
        run: |
          cp test_data_sample.csv data_jobs.csv

      - name: Run main.py to setup data
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: job_posting
          DB_USER: postgres
          DB_PASSWORD: postgres
          PYTHONPATH: .
        run: |
          poetry run python main.py

      - name: Generate dbt profile
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: job_posting
          DB_USER: postgres
          DB_PASSWORD: postgres
          PYTHONPATH: .
        run: poetry run python utils/generate_dbt_profile.py

      - name: Run dbt deps
        working-directory: datajob_etl
        run: poetry run dbt deps --profiles-dir .

      - name: Run dbt run to create tables
        working-directory: datajob_etl
        run: poetry run dbt run --profiles-dir .

      - name: Debug - Check created tables
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d job_posting -c "\dt public_job_posting.*"

      - name: Run pytest (extraction tests only)
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: job_posting
          DB_USER: postgres
          DB_PASSWORD: postgres
          PYTHONPATH: .
        run: |
          poetry run pytest tests/ -v --cov=extraction --cov=db --cov-report=xml --cov-report=term

  dbt-test:
    name: dbt Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: job_posting
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.7.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --no-interaction --only=main

      - name: Generate dbt profile
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: job_posting
          DB_USER: postgres
          DB_PASSWORD: postgres
          PYTHONPATH: .
        run: poetry run python utils/generate_dbt_profile.py

      - name: Load sample data
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: job_posting
          DB_USER: postgres
          DB_PASSWORD: postgres
          PYTHONPATH: .
        run: |
          cp test_data_sample.csv data_jobs.csv
          poetry run python main.py

      - name: Run dbt deps
        working-directory: datajob_etl
        run: poetry run dbt deps --profiles-dir .

      - name: Run dbt compile
        working-directory: datajob_etl
        run: poetry run dbt compile --profiles-dir .

      - name: Run dbt run
        working-directory: datajob_etl
        run: poetry run dbt run --profiles-dir .

      - name: Run dbt test
        working-directory: datajob_etl
        run: poetry run dbt test --profiles-dir .
