name: CI Pipeline Fixed

on:
  push:
    branches: [main, develop, "feat/*", "fix/*"]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.7.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies only
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --only=main --no-root

      - name: Install linting tools
        run: |
          poetry run pip install flake8 black

      - name: Run flake8
        run: |
          poetry run flake8 extraction/ db/ utils/ --count --select=E9,F63,F7,F82 --show-source --statistics
          poetry run flake8 extraction/ db/ utils/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run black check
        run: poetry run black --check extraction/ db/ utils/

  test:
    name: Testing
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: job_posting
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.7.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --no-interaction --only=main --no-root

      - name: Install test dependencies
        run: |
          poetry run pip install pytest pytest-cov

      - name: Create test CSV
        run: |
          echo "job_title_short,job_title,job_location,job_via,job_schedule_type,job_work_from_home,search_location,job_posted_date,job_no_degree_mention,job_health_insurance,job_country,salary_rate,salary_year_avg,salary_hour_avg,company_name,job_skills,job_type_skills" > data_jobs.csv
          echo "Data Engineer,Senior Data Engineer,New York NY,LinkedIn,Full-time,False,New York,2024-01-01,False,True,United States,year,120000.0,,Tech Corp,\"['python', 'sql']\",\"{\\\"programming\\\": [\\\"python\\\", \\\"sql\\\"]}\"" >> data_jobs.csv

      - name: Run pytest
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: job_posting
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: |
          poetry run pytest tests/ -v --cov=extraction --cov=db --cov-report=xml --cov-report=term

  dbt-test:
    name: dbt Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: job_posting
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.7.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --no-interaction --only=main --no-root

      - name: Generate dbt profile
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: job_posting
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: poetry run python utils/generate_dbt_profile.py

      - name: Load sample data
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: job_posting
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: |
          echo "job_title_short,job_title,job_location,job_via,job_schedule_type,job_work_from_home,search_location,job_posted_date,job_no_degree_mention,job_health_insurance,job_country,salary_rate,salary_year_avg,salary_hour_avg,company_name,job_skills,job_type_skills" > data_jobs.csv
          echo "Data Engineer,Senior Data Engineer,New York NY,LinkedIn,Full-time,False,New York,2024-01-01,False,True,United States,year,120000.0,,Tech Corp,\"['python', 'sql']\",\"{\\\"programming\\\": [\\\"python\\\", \\\"sql\\\"]}\"" >> data_jobs.csv
          poetry run python main.py

      - name: Run dbt deps
        working-directory: datajob_etl
        run: poetry run dbt deps

      - name: Run dbt compile
        working-directory: datajob_etl
        run: poetry run dbt compile

      - name: Run dbt run
        working-directory: datajob_etl
        run: poetry run dbt run

      - name: Run dbt test
        working-directory: datajob_etl
        run: poetry run dbt test
